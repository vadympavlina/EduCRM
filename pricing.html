<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Ціноутворення — EduCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f6ef7'/><stop offset='1' stop-color='%233b5be8'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='url(%23g)'/><rect x='7' y='9' width='11' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='8' height='2.5' rx='1.25' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="shared/sidebar.js"></script>
  <script src="shared/ui.js"></script>
  <script src="shared/auth.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    .page-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── TOPBAR ── */
    .topbar {
      height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px;
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .topbar-title { font-size: 16px; font-weight: 800; color: var(--text); }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 24px; max-width: 720px; }

    /* ── SECTION ── */
    .pricing-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-xs);
      margin-bottom: 20px;
    }
    .pricing-section-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text3);
      background: var(--bg3);
    }

    /* ── PRICING ROW ── */
    .pricing-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .pricing-row:last-child { border-bottom: none; }
    .pricing-row.add-row {
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .pricing-teacher-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      min-width: 120px;
    }

    .pricing-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pricing-field label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text3);
    }
    .pricing-input {
      width: 90px;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      background: var(--bg3);
      outline: none;
      transition: border-color 0.15s;
    }
    .pricing-input:focus { border-color: var(--accent); background: var(--bg2); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      font-family: var(--font-main); font-size: 13px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { opacity: 0.9; }
    .btn-danger  { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
    .btn-danger:hover  { background: var(--red-bg); }

    /* ── SELECT ── */
    .form-select {
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 13px;
      color: var(--text);
      background: var(--bg2);
      outline: none;
      transition: border-color 0.15s;
      flex: 1;
      min-width: 160px;
    }
    .form-select:focus { border-color: var(--accent); }

    /* ── EMPTY ── */
    .empty-overrides {
      padding: 20px 18px;
      font-size: 13px;
      color: var(--text3);
      font-weight: 600;
      font-style: italic;
    }

    /* ── AUTH LOADER ── */
    #auth-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .content { padding: 14px; }
      .pricing-row { gap: 10px; }
      .pricing-input { width: 80px; }
    }
  </style>
</head>
<body>

<div id="auth-loader"><div class="auth-spinner"></div></div>

<aside id="sidebar"></aside>

<div class="page-wrap">
  <header class="topbar">
    <span class="topbar-title">Ціноутворення</span>
  </header>

  <div class="content">

    <!-- Default pricing -->
    <div class="pricing-section">
      <div class="pricing-section-head">Стандартні налаштування</div>
      <div class="pricing-row">
        <span class="pricing-teacher-name">Всі вчителі</span>
        <div class="pricing-field">
          <label>Базова ₴</label>
          <input class="pricing-input" type="number" min="0" id="pricing-default-base" value="50">
        </div>
        <div class="pricing-field">
          <label>Бонус за договір ₴</label>
          <input class="pricing-input" type="number" min="0" id="pricing-default-bonus" value="100">
        </div>
        <button class="btn btn-primary" id="pricing-save-default">Зберегти</button>
      </div>
    </div>

    <!-- Overrides -->
    <div class="pricing-section">
      <div class="pricing-section-head">Індивідуальні налаштування</div>
      <div id="pricing-overrides"></div>

      <!-- Add override row -->
      <div class="pricing-row add-row">
        <select class="form-select" id="override-teacher-select">
          <option value="">— Додати для вчителя —</option>
        </select>
        <div class="pricing-field">
          <label>Базова ₴</label>
          <input class="pricing-input" type="number" min="0" id="override-base" value="50">
        </div>
        <div class="pricing-field">
          <label>Бонус ₴</label>
          <input class="pricing-input" type="number" min="0" id="override-bonus" value="100">
        </div>
        <button class="btn btn-success" id="btn-add-override">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Додати
        </button>
      </div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script>
  Sidebar.initNow('pricing');

  let teachers = {};
  let pricing  = { default: { baseReward: 50, contractBonus: 100 }, overrides: {} };

  function onAuthReady() {
    listenTeachers();
    listenPricing();
    setupButtons();
  }

  // ── LISTENERS ─────────────────────────────────────────────
  function listenTeachers() {
    db.ref('people').on('value', snap => {
      teachers = {};
      if (snap.exists()) snap.forEach(c => { teachers[c.key] = { id: c.key, ...c.val() }; });
      populateOverrideSelect();
      renderOverrides();
    });
  }

  function listenPricing() {
    db.ref('pricing/config').on('value', snap => {
      if (snap.exists()) {
        const d = snap.val();
        pricing.default   = d.default   || pricing.default;
        pricing.overrides = d.overrides || {};
      }
      renderDefault();
      renderOverrides();
    });
  }

  // ── RENDER ─────────────────────────────────────────────────
  function renderDefault() {
    document.getElementById('pricing-default-base').value  = pricing.default.baseReward;
    document.getElementById('pricing-default-bonus').value = pricing.default.contractBonus;
  }

  function populateOverrideSelect() {
    const sel = document.getElementById('override-teacher-select');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— Додати для вчителя —</option>';
    Object.values(teachers).forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id; opt.textContent = t.name;
      sel.appendChild(opt);
    });
    sel.value = cur;
  }

  function renderOverrides() {
    const container = document.getElementById('pricing-overrides');
    const entries   = Object.entries(pricing.overrides || {})
      .filter(([tid]) => teachers[tid]);

    if (entries.length === 0) {
      container.innerHTML = '<div class="empty-overrides">Індивідуальних налаштувань ще немає</div>';
      return;
    }

    container.innerHTML = entries.map(([tid, vals]) => {
      const name = teachers[tid]?.name || '';
      return `<div class="pricing-row">
        <span class="pricing-teacher-name">${escapeHTML(name)}</span>
        <div class="pricing-field">
          <label>Базова ₴</label>
          <input class="pricing-input" type="number" min="0" value="${vals.baseReward}"
            onchange="updateOverride('${tid}','baseReward',this.value)">
        </div>
        <div class="pricing-field">
          <label>Бонус ₴</label>
          <input class="pricing-input" type="number" min="0" value="${vals.contractBonus}"
            onchange="updateOverride('${tid}','contractBonus',this.value)">
        </div>
        <button class="btn btn-danger" onclick="removeOverride('${tid}')">Видалити</button>
      </div>`;
    }).join('');
  }

  // ── ACTIONS ────────────────────────────────────────────────
  function setupButtons() {
    document.getElementById('pricing-save-default').addEventListener('click', () => {
      const base  = parseInt(document.getElementById('pricing-default-base').value)  || 0;
      const bonus = parseInt(document.getElementById('pricing-default-bonus').value) || 0;
      db.ref('pricing/config').set({
        ...pricing,
        default: { baseReward: base, contractBonus: bonus }
      }).then(() => showToast('Збережено', 'success'));
    });

    document.getElementById('btn-add-override').addEventListener('click', () => {
      const tid   = document.getElementById('override-teacher-select').value;
      if (!tid) { showToast('Оберіть вчителя', 'error'); return; }
      const base  = parseInt(document.getElementById('override-base').value)  || 50;
      const bonus = parseInt(document.getElementById('override-bonus').value) || 100;
      db.ref('pricing/config').set({
        ...pricing,
        overrides: { ...pricing.overrides, [tid]: { baseReward: base, contractBonus: bonus } }
      }).then(() => {
        showToast('Додано', 'success');
        document.getElementById('override-teacher-select').value = '';
        document.getElementById('override-base').value  = '50';
        document.getElementById('override-bonus').value = '100';
      });
    });
  }

  function updateOverride(tid, field, value) {
    db.ref('pricing/config').set({
      ...pricing,
      overrides: {
        ...pricing.overrides,
        [tid]: { ...pricing.overrides[tid], [field]: parseInt(value) || 0 }
      }
    });
  }

  function removeOverride(tid) {
    showConfirm(`Видалити індивідуальне налаштування для "${teachers[tid]?.name}"?`, () => {
      const newOverrides = { ...pricing.overrides };
      delete newOverrides[tid];
      db.ref('pricing/config').set({ ...pricing, overrides: newOverrides })
        .then(() => showToast('Видалено', 'info'));
    });
  }

  window.updateOverride = updateOverride;
  window.removeOverride = removeOverride;
</script>
</body>
</html>
