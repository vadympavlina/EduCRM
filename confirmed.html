<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Підтверджені — EduCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f6ef7'/><stop offset='1' stop-color='%233b5be8'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='url(%23g)'/><rect x='7' y='9' width='11' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='8' height='2.5' rx='1.25' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="shared/sidebar.js"></script>
  <script src="shared/ui.js"></script>
  <script src="shared/auth.js"></script>
  <script src="shared/topbar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    .page-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── TOPBAR ── */
    .topbar {
      height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px; padding: 0 20px;
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .topbar-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .topbar-spacer { flex: 1; }
    .month-input {
      padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px;
      font-family: var(--font-main); font-size: 13px; color: var(--text);
      background: var(--bg2); outline: none; transition: border-color 0.15s;
    }
    .month-input:focus { border-color: var(--accent); }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 20px; }

    /* ── TABLE ── */
    .table-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-xs);
    }
    table.ct { width: 100%; border-collapse: collapse; }
    .ct thead th {
      padding: 11px 14px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text3); background: var(--bg3);
      border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap;
    }
    .ct tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    .ct tbody tr:last-child { border-bottom: none; }
    .ct tbody tr:hover { background: var(--bg3); }
    .ct tbody td { padding: 12px 14px; font-size: 13px; color: var(--text); vertical-align: middle; }

    .ev-title { font-weight: 700; color: var(--text); }
    .ev-time  { color: var(--text3); font-size: 12px; font-family: var(--font-mono); margin-top: 2px; }

    /* ── ACTION BUTTONS ── */
    .action-btns { display: flex; gap: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 12px; border-radius: 8px;
      font-family: var(--font-main); font-size: 12.5px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap;
    }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { opacity: 0.88; }
    .btn-cancel {
      background: transparent; color: var(--red);
      border: 1.5px solid var(--red);
    }
    .btn-cancel:hover { background: var(--red-bg); }

    /* ── STATUS BADGE ── */
    .badge-confirmed {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 6px;
      background: var(--blue-bg); color: var(--blue-text);
      font-size: 10.5px; font-weight: 800; text-transform: uppercase;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 80px 24px;
      color: var(--text3); font-weight: 600; font-size: 14px; text-align: center;
    }
    .empty-state svg { color: var(--border); }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--text2); }

    /* ── CONFIRM DIALOG ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(15,22,35,0.45);
      display: flex; align-items: center; justify-content: center; padding: 16px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-lg);
      width: 100%; max-width: 400px;
      transform: translateY(8px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .modal-body { padding: 18px 20px; }
    .modal-body p { color: var(--text2); line-height: 1.65; font-size: 14.5px; font-weight: 500; }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 14px 20px 18px; border-top: 1px solid var(--border);
    }
    .btn-ghost {
      background: var(--bg3); color: var(--text2);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border: none; }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ── AUTH LOADER ── */
    #auth-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
    }
    .auth-spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .content { padding: 12px; }
      .ct thead th:nth-child(3), .ct tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<div id="auth-loader"><div class="auth-spinner"></div></div>

<aside id="sidebar"></aside>

<div class="page-wrap">
  <header class="topbar">
    <span class="topbar-title">Підтверджені</span>
    <div class="topbar-spacer"></div>
    <input type="month" id="month-filter" class="month-input">
  </header>

  <div class="content">
    <div id="main-content">
      <div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Завантаження…
      </div>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="modal-overlay" id="confirm-dialog">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Підтвердження</span>
    </div>
    <div class="modal-body"><p id="confirm-message"></p></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="confirm-cancel">Скасувати</button>
      <button class="btn btn-primary" id="confirm-ok">Підтвердити</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  Sidebar.initNow('confirmed');

  let events   = {};
  let teachers = {};

  function onAuthReady() {
    Topbar.init();
    initFilter();
    listenTeachers();
    listenEvents();
  }

  // ── FILTER ────────────────────────────────────────────────
  function initFilter() {
    const now = new Date();
    const el  = document.getElementById('month-filter');
    el.value  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    el.addEventListener('change', render);
  }

  // ── LISTENERS ─────────────────────────────────────────────
  function listenTeachers() {
    db.ref('people').on('value', snap => {
      teachers = {};
      if (snap.exists()) snap.forEach(c => { teachers[c.key] = { id: c.key, ...c.val() }; });
      render();
    });
  }

  function listenEvents() {
    db.ref('events').on('value', snap => {
      events = snap.val() || {};
      render();
    });
  }

  // ── HELPERS ───────────────────────────────────────────────
  function teacherName(id) { return id ? (teachers[id]?.name || '—') : '—'; }

  // ── RENDER ────────────────────────────────────────────────
  function render() {
    const selectedMonth = document.getElementById('month-filter').value;

    const list = Object.values(events).filter(ev =>
      ev.status === 'confirmed' &&
      ev.date &&
      (!selectedMonth || ev.date && ev.date && ev.date.startsWith(selectedMonth))
    ).sort((a, b) =>
      a.date.localeCompare(b.date) || (a.startTime||'').localeCompare(b.startTime||'')
    );

    const wrap = document.getElementById('main-content');

    if (list.length === 0) {
      wrap.innerHTML = `<div class="empty-state">
        <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <div class="empty-title">Підтверджених подій немає</div>
        <span>Спробуйте обрати інший місяць</span>
      </div>`;
      return;
    }

    const rows = list.map(ev => `
      <tr>
        <td>
          <div class="ev-title">${escapeHTML(ev.title || '—')}</div>
          ${ev.phone ? `<div class="ev-time">${escapeHTML(ev.phone)}</div>` : ''}
        </td>
        <td>
          <div style="font-weight:600">${ev.date || ''}</div>
          <div class="ev-time">${ev.startTime || ''}–${ev.endTime || ''}</div>
        </td>
        <td>${escapeHTML(teacherName(ev.assignedPersonId))}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn-success" onclick="completeEvent('${ev.id}')">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Проведено
            </button>
            <button class="btn btn-cancel" onclick="cancelEvent('${ev.id}')">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
              Ні
            </button>
          </div>
        </td>
      </tr>`).join('');

    wrap.innerHTML = `<div class="table-card">
      <table class="ct">
        <thead><tr>
          <th>Назва</th><th>Дата та час</th><th>Вчитель</th><th>Дії</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // ── ACTIONS ───────────────────────────────────────────────
  function completeEvent(id) {
    showConfirm('Позначити подію як проведену?', async () => {
      await db.ref('events/' + id).update({
        status:      'completed',
        completedBy: currentUser,
        completedAt: new Date().toISOString(),
        contractSigned: false
      });
      showToast('Подію завершено', 'success');
    });
  }

  function cancelEvent(id) {
    showConfirm('Скасувати цю подію?', async () => {
      await db.ref('events/' + id).update({
        status:      'cancelled',
        cancelledBy: currentUser
      });
      showToast('Подію скасовано', 'info');
    });
  }

  window.completeEvent = completeEvent;
  window.cancelEvent   = cancelEvent;
</script>
</body>
</html>
