<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Вчителі — EduCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f6ef7'/><stop offset='1' stop-color='%233b5be8'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='url(%23g)'/><rect x='7' y='9' width='11' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='8' height='2.5' rx='1.25' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="shared/sidebar.js"></script>
  <script src="shared/ui.js"></script>
  <script src="shared/auth.js"></script>
  <script src="shared/topbar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    .page-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── TOPBAR ── */
    .topbar {
      height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 0 20px;
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .topbar-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .topbar-spacer { flex: 1; }
    .topbar-spacer { flex: 1; }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ── TEACHER LIST ── */
    .teacher-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 100%;
    }

    .teacher-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow 0.15s;
      box-shadow: var(--shadow-xs);
    }
    .teacher-card:hover { box-shadow: var(--shadow-sm); }

    .teacher-av {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: var(--accent-light);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 17px;
      flex-shrink: 0;
    }

    .teacher-info { flex: 1; min-width: 0; }
    .teacher-name {
      font-size: 14px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .teacher-id-label {
      font-size: 11px; color: var(--text3); font-weight: 500;
      font-family: var(--font-mono); margin-top: 2px;
    }

    .teacher-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      font-family: var(--font-main); font-size: 13px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: var(--bg3); color: var(--text2);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .btn-danger-soft {
      background: transparent; color: var(--red);
      border: 1.5px solid transparent;
    }
    .btn-danger-soft:hover { background: var(--red-bg); border-color: var(--red); }
    .btn-sm { padding: 6px 12px; font-size: 12.5px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 72px 24px;
      color: var(--text3); font-weight: 600; font-size: 14px;
      text-align: center;
    }
    .empty-state svg { color: var(--border); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(15,22,35,0.45);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%; max-width: 400px;
      transform: translateY(8px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text3); padding: 4px; border-radius: 6px;
      display: flex; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 18px 20px; }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 14px 20px 18px;
      border-top: 1px solid var(--border);
    }

    .form-group { margin-bottom: 0; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: var(--font-main); font-size: 14px; color: var(--text);
      background: var(--bg3); outline: none; transition: border-color 0.15s;
    }
    .form-control:focus { border-color: var(--accent); background: var(--bg2); }

    /* ── CONFIRM ── */
    #confirm-dialog .modal-body p {
      color: var(--text2); line-height: 1.65; font-size: 14.5px; font-weight: 500;
    }

    /* ── AUTH LOADER ── */
    #auth-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
    }
    .auth-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .content { padding: 14px; }
      .teacher-card { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<div id="auth-loader"><div class="auth-spinner"></div></div>

<aside id="sidebar"></aside>

<div class="page-wrap">
  <header class="topbar">
    <span class="topbar-title">Вчителі</span>
    <div class="topbar-spacer"></div>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Додати
    </button>
  </header>

  <div class="content">
    <div class="teacher-list" id="teachers-list">
      <div class="empty-state">
        <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
        </svg>
        Завантаження…
      </div>
    </div>
  </div>
</div>

<!-- Teacher modal -->
<div class="modal-overlay" id="teacher-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="teacher-modal-title">Додати вчителя</span>
      <button class="modal-close" onclick="closeModal('teacher-modal')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="teacher-id">
      <div class="form-group">
        <label class="form-label">Повне ім'я *</label>
        <input type="text" class="form-control" id="teacher-name-input"
          placeholder="напр. Анна Коваль" autocomplete="off"
          onkeydown="if(event.key==='Enter') saveTeacher()">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('teacher-modal')">Скасувати</button>
      <button class="btn btn-primary" onclick="saveTeacher()">Зберегти</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="modal-overlay" id="confirm-dialog">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Підтвердження</span>
    </div>
    <div class="modal-body">
      <p id="confirm-message"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="confirm-cancel">Скасувати</button>
      <button class="btn btn-primary" id="confirm-ok">Підтвердити</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  Sidebar.initNow('teachers');

  let teachers = {};

  function onAuthReady() {
    Topbar.init();
    listenTeachers();
  }

  // ── LISTENERS ─────────────────────────────────────────────
  function listenTeachers() {
    db.ref('people').on('value', snap => {
      teachers = {};
      if (snap.exists()) snap.forEach(c => { teachers[c.key] = { id: c.key, ...c.val() }; });
      renderTeachers();
    });
  }

  // ── RENDER ────────────────────────────────────────────────
  function renderTeachers() {
    const list = document.getElementById('teachers-list');
    const items = Object.values(teachers).sort((a, b) => a.name.localeCompare(b.name, 'uk'));

    if (items.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Вчителів ще немає. Додайте першого!
      </div>`;
      return;
    }

    list.innerHTML = items.map(t => `
      <div class="teacher-card">
        <div class="teacher-av">${t.name.charAt(0).toUpperCase()}</div>
        <div class="teacher-info">
          <div class="teacher-name">${escapeHTML(t.name)}</div>
        </div>
        <div class="teacher-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${t.id}', '${escapeHTML(t.name).replace(/'/g,"\\'")}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Редагувати
          </button>
          <button class="btn btn-danger-soft btn-sm" onclick="deleteTeacher('${t.id}', '${escapeHTML(t.name).replace(/'/g,"\\'")}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
            </svg>
            Видалити
          </button>
        </div>
      </div>`).join('');
  }

  // ── MODAL ─────────────────────────────────────────────────
  function openAddModal() {
    document.getElementById('teacher-modal-title').textContent = 'Додати вчителя';
    document.getElementById('teacher-id').value = '';
    document.getElementById('teacher-name-input').value = '';
    openModal('teacher-modal');
    setTimeout(() => document.getElementById('teacher-name-input').focus(), 100);
  }

  function openEditModal(id, name) {
    document.getElementById('teacher-modal-title').textContent = 'Редагувати вчителя';
    document.getElementById('teacher-id').value = id;
    document.getElementById('teacher-name-input').value = name;
    openModal('teacher-modal');
    setTimeout(() => document.getElementById('teacher-name-input').focus(), 100);
  }

  async function saveTeacher() {
    const id   = document.getElementById('teacher-id').value;
    const name = document.getElementById('teacher-name-input').value.trim();
    if (!name) {
      document.getElementById('teacher-name-input').style.borderColor = 'var(--red)';
      setTimeout(() => document.getElementById('teacher-name-input').style.borderColor = '', 1500);
      return;
    }
    if (id) {
      await db.ref('people/' + id).update({ name });
      showToast('Оновлено', 'success');
    } else {
      await db.ref('people').push({ name });
      showToast('Вчителя додано', 'success');
    }
    closeModal('teacher-modal');
  }

  function deleteTeacher(id, name) {
    showConfirm(`Видалити вчителя "${name}"?`, async () => {
      await db.ref('people/' + id).remove();
      showToast('Видалено', 'info');
    });
  }

  window.openEditModal  = openEditModal;
  window.deleteTeacher  = deleteTeacher;
</script>
</body>
</html>
