<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Клієнти — EduCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f6ef7'/><stop offset='1' stop-color='%233b5be8'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='url(%23g)'/><rect x='7' y='9' width='11' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='8' height='2.5' rx='1.25' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-main); background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 0 20px;
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .topbar-sep { width: 1px; height: 18px; background: var(--border); }
    .topbar-title { font-size: 15px; font-weight: 800; color: var(--text); }
    .topbar-spacer { flex: 1; }
    .topbar-user { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text2); }
    .topbar-av {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg,#4f6ef7,#3b5be8);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; flex-shrink: 0;
    }

    /* ── LAYOUT ── */
    .page-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── TOOLBAR ── */
    .toolbar { padding: 18px 22px 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
    .search-wrap { flex: 1; min-width: 200px; max-width: 420px; position: relative; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
    .search-input {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--font-main); font-size: 13.5px; color: var(--text);
      background: var(--bg2); outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text3); }
    .count-chip {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap;
    }
    .count-chip span { color: var(--accent); font-family: var(--font-mono); }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 14px 22px 24px; display: flex; flex-direction: column; gap: 12px; }

    /* ── TABLE ── */
    .table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-xs); }
    table.cl-table { width: 100%; border-collapse: collapse; }
    .cl-table thead th {
      padding: 11px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text3); background: var(--bg3);
      border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap;
    }
    .cl-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.13s; }
    .cl-table tbody tr:last-child { border-bottom: none; }
    .cl-table tbody tr:hover { background: var(--bg3); }
    .cl-table tbody td { padding: 12px 16px; font-size: 13.5px; color: var(--text); vertical-align: middle; }
    .noname { color: var(--text3); font-style: italic; }
    .phone-mono { font-family: var(--font-mono); font-size: 13px; color: var(--text2); }
    .date-val { font-size: 12.5px; color: var(--text3); font-weight: 600; }
    .cnt-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; background: var(--accent-light);
      color: var(--accent); border-radius: 6px; font-size: 12px;
      font-weight: 800; padding: 0 5px; font-family: var(--font-mono);
    }

    /* ── PAGINATION ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 4px 0; }
    .pg-btn {
      min-width: 34px; height: 34px; padding: 0 10px;
      border: 1.5px solid var(--border); background: var(--bg2); border-radius: 8px;
      font-family: var(--font-main); font-size: 13px; font-weight: 700; color: var(--text2);
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .pg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── STATES ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 72px 24px;
      color: var(--text3); font-weight: 600; font-size: 14px;
    }
    .spinner-wrap { display: flex; align-items: center; gap: 10px; padding: 56px; color: var(--text3); font-weight: 600; font-size: 14px; justify-content: center; }
    .cl-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── AUTH LOADER ── */
    #auth-loader { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    .auth-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }

    @media (max-width: 640px) {
      .topbar { padding: 0 12px; }
      .toolbar { padding: 12px 12px 0; }
      .content { padding: 12px 12px 20px; }
      .cl-table thead th:nth-child(3), .cl-table tbody td:nth-child(3),
      .cl-table thead th:nth-child(4), .cl-table tbody td:nth-child(4) { display: none; }
    }
  </style>
  <script src="shared/topbar.js"></script>
</head>
<body>

<div id="auth-loader"><div class="auth-spinner"></div></div>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sb-logo"><div class="sb-logo-icon">
    <svg width="20" height="20" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </div></div>
  <div class="sb-divider"></div>
  <nav class="sb-nav">
    <a class="sb-item" href="index.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="sb-tip">Календар</span>
    </a>
    <a class="sb-item" href="confirmed.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="sb-tip">Підтверджені</span>
    </a>
    <a class="sb-item" href="schedule.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M9 16l2 2 4-4"/></svg>
      <span class="sb-tip">Графік роботи</span>
    </a>
    <a class="sb-item" href="completed.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span class="sb-tip">Завершені</span>
    </a>
    <a class="sb-item" href="stats.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="sb-tip">Статистика</span>
    </a>
    <div class="sb-divider"></div>
    <a class="sb-item" href="pricing.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span class="sb-tip">Ціноутворення</span>
    </a>
    <a class="sb-item" href="teachers.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="sb-tip">Вчителі</span>
    </a>
    <div class="sb-divider"></div>
    <a class="sb-item active" href="clients.html">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="sb-tip">Клієнти</span>
    </a>
  </nav>
  <div class="sb-bottom">
    <div class="sb-divider"></div>
    <div class="sb-item sb-user-item">
      <div class="sb-user-av" id="sb-user-av">?</div>
      <span class="sb-tip" id="sb-user-name">—</span>
    </div>
  </div>
</aside>

<!-- PAGE -->
<div class="page-wrap">
  <header class="topbar">
    <div class="topbar-sep"></div>
    <span class="topbar-title">Клієнти</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <div class="topbar-av" id="topbar-av">?</div>
      <span id="topbar-user-name"></span>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="cl-search" type="search" placeholder="Пошук по імені або телефону…" oninput="onSearch()">
    </div>
    <div class="count-chip">Всього: <span id="cl-total">—</span></div>
  </div>

  <div class="content">
    <div id="cl-body"><div class="spinner-wrap"><div class="cl-spinner"></div>Завантаження…</div></div>
    <div id="cl-pagination" class="pagination"></div>
  </div>
</div>

<script>
  const PAGE_SIZE = 20;
  let currentUser = '';
  let allClients  = [];
  let filtered    = [];
  let currentPage = 1;

  function ini(name) {
    return (name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || '?';
  }

  auth.onAuthStateChanged(async firebaseUser => {
    const loader = document.getElementById('auth-loader');
    if (!firebaseUser) { window.location.href = 'index.html'; return; }
    try {
      const snap = await db.ref('users').orderByChild('email')
        .equalTo(firebaseUser.email.toLowerCase()).once('value');
      if (!snap.exists()) { await auth.signOut(); window.location.href = 'index.html'; return; }
      const uid = Object.keys(snap.val())[0];
      currentUser = snap.val()[uid].name || firebaseUser.displayName || firebaseUser.email;
      const av = ini(currentUser);
      document.getElementById('sb-user-av').textContent     = av;
      document.getElementById('sb-user-name').textContent   = currentUser;
      document.getElementById('topbar-av').textContent      = av;
      document.getElementById('topbar-user-name').textContent = currentUser;
      loader.style.display = 'none';
      Topbar.init();
      listenClients();
    } catch (e) { window.location.href = 'index.html'; }
  });

  function listenClients() {
    db.ref('clients').orderByChild('lastEventAt').on('value', snap => {
      const raw = snap.val() || {};
      allClients = Object.entries(raw)
        .map(([key, c]) => ({ key, ...c }))
        .sort((a, b) => (b.lastEventAt || 0) - (a.lastEventAt || 0));
      onSearch();
    });
  }

  function onSearch() {
    const q = (document.getElementById('cl-search').value || '').trim().toLowerCase();
    filtered = q
      ? allClients.filter(c =>
          (c.name || '').toLowerCase().includes(q) ||
          (c.phone || '').replace(/\D/g,'').includes(q.replace(/\D/g,''))
        )
      : [...allClients];
    currentPage = 1;
    document.getElementById('cl-total').textContent = filtered.length;
    render();
  }

  function render() {
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);
    const body  = document.getElementById('cl-body');

    if (filtered.length === 0) {
      body.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:var(--text3)">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Клієнтів не знайдено</span>
      </div>`;
      document.getElementById('cl-pagination').innerHTML = '';
      return;
    }

    body.innerHTML = `
      <div class="table-card">
        <table class="cl-table">
          <thead><tr>
            <th>Ім'я / Телефон</th><th>Остання подія</th><th>Подій</th>
          </tr></thead>
          <tbody>${page.map(c => {
            const name    = c.name || '';
            const lastDate = c.lastEventAt
              ? new Date(c.lastEventAt).toLocaleDateString('uk-UA', {day:'2-digit', month:'short', year:'numeric'})
              : '—';
            return `<tr onclick="window.location.href='client.html?id=${encodeURIComponent(c.key)}'">
              <td>
                <div style="font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:2px">${name ? escH(name) : '<span class=\"noname\">Без імені</span>'}</div>
                <div class="phone-mono" style="font-size:12px">${escH(c.phone || c.key)}</div>
              </td>
              <td><span class="date-val">${lastDate}</span></td>
              <td><span class="cnt-badge" id="cnt-${c.key}">—</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;

    page.forEach(c => {
      db.ref('events').orderByChild('phone').equalTo(c.phone || c.key).once('value').then(s => {
        const el = document.getElementById('cnt-' + c.key);
        if (el) el.textContent = s.exists() ? Object.keys(s.val()).length : 0;
      });
    });

    renderPagination();
  }

  function renderPagination() {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    if (total <= 1) { document.getElementById('cl-pagination').innerHTML = ''; return; }
    let html = `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>`;
    for (let i = 1; i <= total; i++) {
      if (total > 7 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== total) {
        if (i === currentPage - 3 || i === currentPage + 3) html += `<span style="color:var(--text3);padding:0 4px">…</span>`;
        continue;
      }
      html += `<button class="pg-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
    document.getElementById('cl-pagination').innerHTML = html;
  }

  function goPage(p) {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    if (p < 1 || p > total) return;
    currentPage = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
