<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Договори — EduCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f6ef7'/><stop offset='1' stop-color='%233b5be8'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='url(%23g)'/><rect x='7' y='9' width='11' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='8' height='2.5' rx='1.25' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="shared/sidebar.js"></script>
  <script src="shared/ui.js"></script>
  <script src="shared/auth.js"></script>
  <script src="shared/topbar.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-main); background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }
    .page-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .topbar {
      height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px; padding: 0 20px;
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .topbar-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .topbar-spacer { flex: 1; }
    .month-input {
      padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px;
      font-family: var(--font-main); font-size: 13px; color: var(--text);
      background: var(--bg2); outline: none; transition: border-color 0.15s;
    }
    .month-input:focus { border-color: var(--accent); }

    .summary-bar {
      display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .summary-chip {
      flex: 1; padding: 12px 20px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 2px;
    }
    .summary-chip:last-child { border-right: none; }
    .summary-chip-val { font-size: 20px; font-weight: 800; color: var(--text); font-family: var(--font-mono); line-height: 1; }
    .summary-chip-val.green { color: var(--green); }
    .summary-chip-val.blue  { color: var(--accent); }
    .summary-chip-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

    .content { flex: 1; overflow-y: auto; padding: 20px; }

    .table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-xs); }
    table.ct { width: 100%; border-collapse: collapse; }
    .ct thead th {
      padding: 11px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text3); background: var(--bg3);
      border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap;
    }
    .ct tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    .ct tbody tr:last-child { border-bottom: none; }
    .ct tbody tr:hover { background: var(--bg3); }
    .ct tbody td { padding: 11px 14px; font-size: 13px; color: var(--text); vertical-align: middle; }

    .phone-copy { cursor: pointer; color: var(--accent); font-family: var(--font-mono); font-size: 12.5px; transition: opacity 0.15s; }
    .phone-copy:hover { opacity: 0.75; }
    .client-link { color: var(--text); font-weight: 700; text-decoration: none; }
    .client-link:hover { text-decoration: underline; color: var(--accent); }
    .badge-already { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

    .empty-state { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 80px 24px; color: var(--text3); font-weight: 600; font-size: 14px; text-align: center; }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--text2); }

    #auth-loader { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    .auth-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="auth-loader"><div class="auth-spinner"></div></div>
<aside id="sidebar"></aside>
<div class="page-wrap">
  <header class="topbar">
    <span class="topbar-title">Договори</span>
    <div class="topbar-spacer"></div>
    <input type="month" id="month-filter" class="month-input">
  </header>
  <div class="summary-bar">
    <div class="summary-chip">
      <div class="summary-chip-val blue" id="sum-total">0</div>
      <div class="summary-chip-label">Всього договорів</div>
    </div>
    <div class="summary-chip">
      <div class="summary-chip-val green" id="sum-new">0</div>
      <div class="summary-chip-label">Нових (бонус)</div>
    </div>
    <div class="summary-chip">
      <div class="summary-chip-val" id="sum-already">0</div>
      <div class="summary-chip-label">Вже мали</div>
    </div>
  </div>
  <div class="content">
    <div id="main-content">
      <div class="empty-state">
        <div class="empty-title">Завантаження…</div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
  Sidebar.initNow('contracts');

  let teachers  = {};
  let allContracts = []; // [{id, phone, clientName, ...}]

  function onAuthReady() {
    Topbar.init();
    initFilter();
    listenTeachers();
    listenContracts();
  }

  function initFilter() {
    const now = new Date();
    const el  = document.getElementById('month-filter');
    el.value  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    el.addEventListener('change', render);
  }

  function listenTeachers() {
    db.ref('people').on('value', snap => {
      teachers = {};
      if (snap.exists()) snap.forEach(c => { teachers[c.key] = { id: c.key, ...c.val() }; });
      render();
    });
  }

  function listenContracts() {
    db.ref('clients').on('value', snap => {
      allContracts = [];
      if (!snap.exists()) { render(); return; }
      snap.forEach(clientSnap => {
        const phone = clientSnap.key;
        const v = clientSnap.val();
        const clientName = v.name || '';
        if (v.contracts) {
          Object.entries(v.contracts).forEach(([cid, c]) => {
            allContracts.push({ id: cid, phone, clientCardName: clientName, ...c });
          });
        }
      });
      render();
    });
  }

  function teacherName(id) { return id ? (teachers[id]?.name || '—') : '—'; }

  function fmtDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function escH(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    const selectedMonth = document.getElementById('month-filter').value;

    const filtered = allContracts.filter(c => {
      if (!selectedMonth) return true;
      if (!c.signedAt) return false;
      const d = new Date(c.signedAt);
      const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return m === selectedMonth;
    }).sort((a, b) => (b.signedAt || 0) - (a.signedAt || 0));

    const total   = filtered.length;
    const newOnes = filtered.filter(c => !c.alreadyHad).length;
    const already = filtered.filter(c => c.alreadyHad).length;

    document.getElementById('sum-total').textContent   = total;
    document.getElementById('sum-new').textContent     = newOnes;
    document.getElementById('sum-already').textContent = already;

    const wrap = document.getElementById('main-content');

    if (total === 0) {
      wrap.innerHTML = `<div class="empty-state">
        <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/>
        </svg>
        <div class="empty-title">Договорів немає</div>
        <span>За вибраний місяць нічого не знайдено</span>
      </div>`;
      return;
    }

    const rows = filtered.map(c => {
      const displayName = c.clientName || c.clientCardName || '—';
      const clientUrl = c.phone ? `client.html?id=${encodeURIComponent(c.phone)}` : null;
      const nameCell = clientUrl
        ? `<a href="${clientUrl}" target="_blank" class="client-link">${escH(displayName)}</a>`
        : escH(displayName);

      const phoneCell = c.phone
        ? `<span class="phone-copy" onclick="copyPhone(this,'${escH(c.phone)}')">${escH(c.phone)}</span>`
        : '—';

      const contractType = c.alreadyHad
        ? `<span class="badge-already">Вже мав</span>`
        : `<span style="color:var(--green);font-weight:700;font-size:12px">✓ Новий</span>`;

      const eventCell = c.eventTitle
        ? `<span style="font-size:12px;color:var(--text2)">${escH(c.eventTitle)}</span>`
        : '<span style="color:var(--text3)">—</span>';

      return `<tr>
        <td>${fmtDate(c.signedAt)}</td>
        <td>${nameCell}</td>
        <td>${phoneCell}</td>
        <td>${escH(c.title || '—')}</td>
        <td>${escH(teacherName(c.teacherId))}</td>
        <td>${eventCell}</td>
        <td>${contractType}</td>
        <td>${escH(c.signedBy || '—')}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<div class="table-card">
      <table class="ct">
        <thead><tr>
          <th>Дата підписання</th>
          <th>Клієнт</th>
          <th>Телефон</th>
          <th>Назва договору</th>
          <th>Вчитель</th>
          <th>Подія</th>
          <th>Тип</th>
          <th>Оформив</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  function copyPhone(el, phone) {
    navigator.clipboard.writeText(phone).then(() => {
      const prev = el.textContent;
      el.textContent = 'Скопійовано!';
      setTimeout(() => el.textContent = prev, 1400);
    });
  }

  window.copyPhone = copyPhone;
</script>
</body>
</html>
