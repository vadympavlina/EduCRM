<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Завершені — EduCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f6ef7'/><stop offset='1' stop-color='%233b5be8'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='url(%23g)'/><rect x='7' y='9' width='11' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='8' height='2.5' rx='1.25' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="shared/sidebar.js"></script>
  <script src="shared/ui.js"></script>
  <script src="shared/auth.js"></script>
  <script src="shared/topbar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    .page-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── TOPBAR ── */
    .topbar {
      height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px; padding: 0 20px;
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .topbar-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .topbar-spacer { flex: 1; }
    .month-input {
      padding: 7px 10px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: var(--font-main); font-size: 13px; color: var(--text);
      background: var(--bg2); outline: none; transition: border-color 0.15s;
    }
    .month-input:focus { border-color: var(--accent); }

    /* ── SUMMARY CHIPS ── */
    .summary-bar {
      display: flex; gap: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .summary-chip {
      flex: 1; padding: 12px 20px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 2px;
    }
    .summary-chip:last-child { border-right: none; }
    .summary-chip-val {
      font-size: 20px; font-weight: 800;
      color: var(--text); font-family: var(--font-mono); line-height: 1;
    }
    .summary-chip-val.green { color: var(--green); }
    .summary-chip-val.blue  { color: var(--accent); }
    .summary-chip-label {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 20px; }

    /* ── TABLE ── */
    .table-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-xs);
    }
    table.ct { width: 100%; border-collapse: collapse; }
    .ct thead th {
      padding: 11px 14px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text3); background: var(--bg3);
      border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap;
    }
    .ct tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    .ct tbody tr:last-child { border-bottom: none; }
    .ct tbody tr:hover { background: var(--bg3); }
    .ct tbody td { padding: 11px 14px; font-size: 13px; color: var(--text); vertical-align: middle; }

    .earnings-val { color: var(--green); font-weight: 800; font-family: var(--font-mono); }
    .phone-copy {
      cursor: pointer; color: var(--accent); font-family: var(--font-mono);
      font-size: 12.5px; transition: opacity 0.15s;
    }
    .phone-copy:hover { opacity: 0.75; }

    /* Contract checkbox */
    .ct input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

    /* ── EMPTY ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 80px 24px;
      color: var(--text3); font-weight: 600; font-size: 14px; text-align: center;
    }
    .empty-state svg { color: var(--border); }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--text2); }

    /* ── AUTH LOADER ── */
    #auth-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
    }
    .auth-spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .summary-chip-val { font-size: 16px; }
      .summary-chip { padding: 10px 12px; }
      .content { padding: 12px; }
      .ct thead th:nth-child(3),
      .ct tbody td:nth-child(3),
      .ct thead th:nth-child(8),
      .ct tbody td:nth-child(8) { display: none; }
    }
  </style>
</head>
<body>

<div id="auth-loader"><div class="auth-spinner"></div></div>

<aside id="sidebar"></aside>

<div class="page-wrap">
  <header class="topbar">
    <span class="topbar-title">Завершені</span>
    <div class="topbar-spacer"></div>
    <input type="month" id="month-filter" class="month-input">
  </header>

  <!-- Summary bar -->
  <div class="summary-bar">
    <div class="summary-chip">
      <div class="summary-chip-val" id="sum-total">0</div>
      <div class="summary-chip-label">Подій</div>
    </div>
    <div class="summary-chip">
      <div class="summary-chip-val green" id="sum-earnings">₴0</div>
      <div class="summary-chip-label">Заробіток</div>
    </div>
    <div class="summary-chip">
      <div class="summary-chip-val blue" id="sum-contracts">0</div>
      <div class="summary-chip-label">Договорів</div>
    </div>
  </div>

  <div class="content">
    <div id="main-content">
      <div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <div class="empty-title">Завантаження…</div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  Sidebar.initNow('completed');

  let events      = {};
  let groupEvents = {};
  let teachers    = {};
  let pricing     = { default: { baseReward: 50, contractBonus: 100 }, overrides: {} };
  let allContracts = [];

  function onAuthReady() {
    Topbar.init();
    initFilter();
    listenTeachers();
    listenPricing();
    listenEvents();
    listenGroupEvents();
    listenContracts();
  }

  // ── FILTER ────────────────────────────────────────────────
  function initFilter() {
    const now = new Date();
    const el  = document.getElementById('month-filter');
    el.value  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    el.addEventListener('change', renderCompleted);
  }

  // ── LISTENERS ─────────────────────────────────────────────
  function listenTeachers() {
    db.ref('people').on('value', snap => {
      teachers = {};
      if (snap.exists()) snap.forEach(c => { teachers[c.key] = { id: c.key, ...c.val() }; });
      renderCompleted();
    });
  }

  function listenPricing() {
    db.ref('pricing/config').on('value', snap => {
      if (snap.exists()) {
        const d = snap.val();
        pricing.default   = d.default   || pricing.default;
        pricing.overrides = d.overrides || {};
      }
      renderCompleted();
    });
  }

  function listenEvents() {
    db.ref('events').on('value', snap => {
      events = snap.val() || {};
      renderCompleted();
    });
  }

  function listenGroupEvents() {
    db.ref('groupEvents').on('value', snap => {
      groupEvents = {};
      if (snap.exists()) snap.forEach(c => { groupEvents[c.key] = { id: c.key, ...c.val() }; });
      renderCompleted();
    });
  }

  function listenContracts() {
    db.ref('clients').on('value', snap => {
      allContracts = [];
      if (snap.exists()) {
        snap.forEach(clientSnap => {
          const phone = clientSnap.key;
          const v = clientSnap.val();
          if (v.contracts) {
            Object.entries(v.contracts).forEach(([cid, c]) => {
              allContracts.push({ id: cid, phone, ...c });
            });
          }
        });
      }
      renderCompleted();
    });
  }

  // ── HELPERS ───────────────────────────────────────────────
  function teacherName(id) { return id ? (teachers[id]?.name || '—') : '—'; }
  function getPricing(tid) {
    return (tid && pricing.overrides[tid]) ? pricing.overrides[tid] : pricing.default;
  }
  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}.${m}.${y}`;
  }

  // ── RENDER ────────────────────────────────────────────────
  function renderCompleted() {
    const selectedMonth = document.getElementById('month-filter').value;

    // Звичайні завершені події — виключаємо isGroupMirror (вони не самостійні рядки)
    const list = Object.values(events).filter(e => {
      if (e.status !== 'completed') return false;
      if (e.isGroupMirror) return false;
      if (selectedMonth && (!e.date || !e.date.startsWith(selectedMonth))) return false;
      return true;
    }).sort((a, b) => new Date(b.completedAt || 0) - new Date(a.completedAt || 0));

    // Завершені групові події — кожна один рядок незалежно від кількості учасників
    const groupList = Object.values(groupEvents).filter(ge => {
      if (ge.status !== 'completed') return false;
      if (selectedMonth && (!ge.date || !ge.date.startsWith(selectedMonth))) return false;
      return true;
    }).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

    // Договори за вибраний місяць (по даті підписання), для підрахунку бонусів і прапорців у таблиці
    const contractsInMonth = allContracts.filter(c => {
      if (c.alreadyHad) return false;
      if (!selectedMonth) return true;
      if (!c.signedAt) return false;
      const d = new Date(c.signedAt);
      const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return m === selectedMonth;
    });
    const contractsByEventTag = {};
    contractsInMonth.forEach(c => {
      if (!c.eventId) return;
      if (!contractsByEventTag[c.eventId]) contractsByEventTag[c.eventId] = [];
      contractsByEventTag[c.eventId].push(c);
    });

    let totalEarnings = 0, totalContracts = contractsInMonth.length;

    list.forEach(ev => {
      const p = getPricing(ev.assignedPersonId);
      const hasContract = !!(contractsByEventTag[ev.id] && contractsByEventTag[ev.id].length);
      totalEarnings += hasContract ? p.baseReward + p.contractBonus : p.baseReward;
    });
    groupList.forEach(ge => {
      const p = getPricing(ge.assignedPersonId);
      // groupEvent сам по собі дає 1 baseReward; бонуси за договори її учасників рахуються нижче окремо
      totalEarnings += p.baseReward;
    });
    // Бонуси за договори учасників групових подій (eventId формату group_{geId}_{pid})
    contractsInMonth.forEach(c => {
      if (!c.eventId || !c.eventId.startsWith('group_')) return;
      const ge = groupList.find(g => c.eventId.startsWith('group_' + g.id + '_'));
      if (!ge) return;
      const p = getPricing(ge.assignedPersonId);
      totalEarnings += p.contractBonus;
    });

    const totalCount = list.length + groupList.length;

    document.getElementById('sum-total').textContent     = totalCount;
    document.getElementById('sum-earnings').textContent  = '₴' + totalEarnings;
    document.getElementById('sum-contracts').textContent = totalContracts;

    const wrap = document.getElementById('main-content');

    if (totalCount === 0) {
      wrap.innerHTML = `<div class="empty-state">
        <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <div class="empty-title">Завершених подій немає</div>
        <span>За вибраний місяць нічого не знайдено</span>
      </div>`;
      return;
    }

    const singleRows = list.map(ev => {
      const p    = getPricing(ev.assignedPersonId);
      const hasContract = !!(contractsByEventTag[ev.id] && contractsByEventTag[ev.id].length);
      const earn = hasContract ? p.baseReward + p.contractBonus : p.baseReward;
      const rawPhone = ev.phone ? ev.phone.replace(/\D/g, '') : '';
      const clientUrl = rawPhone ? `client.html?id=${encodeURIComponent(rawPhone)}` : null;
      const phoneCell = ev.phone
        ? `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="phone-copy" onclick="copyPhone(this,'${ev.phone}')">${escapeHTML(ev.phone)}</span>
            ${clientUrl ? `<a href="${clientUrl}" target="_blank" style="color:var(--accent);font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap" title="Відкрити картку клієнта">↗ картка</a>` : ''}
           </div>`
        : '—';
      return `<tr>
        <td>${escapeHTML(ev.title || '—')}</td>
        <td>${fmtDate(ev.date)}</td>
        <td>${ev.startTime || ''}–${ev.endTime || ''}</td>
        <td>${escapeHTML(teacherName(ev.assignedPersonId))}</td>
        <td>${phoneCell}</td>
        <td>${hasContract ? '✓' : '—'}</td>
        <td class="earnings-val">₴${earn}</td>
        <td>${escapeHTML(ev.completedBy || '—')}</td>
      </tr>`;
    }).join('');

    const groupRows = groupList.map(ge => {
      const p = getPricing(ge.assignedPersonId);
      const participants = Object.values(ge.participants || {});
      const geContracts = contractsInMonth.filter(c => c.eventId && c.eventId.startsWith('group_' + ge.id + '_'));
      const earn = p.baseReward + geContracts.length * p.contractBonus;

      const participantLinks = participants.map(pt => {
        const phone = (pt.phone || '').replace(/\D/g, '');
        const clientUrl = phone ? `client.html?id=${encodeURIComponent(phone)}` : null;
        const namePart = clientUrl
          ? `<a href="${clientUrl}" target="_blank" style="color:var(--text);font-weight:700;text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${escapeHTML(pt.name || '—')}</a>`
          : escapeHTML(pt.name || '—');
        const phonePart = phone
          ? `<span class="phone-copy" onclick="copyPhone(this,'${pt.phone}')">${escapeHTML(pt.phone)}</span>`
          : '';
        return `<div style="display:flex;align-items:center;gap:6px;padding:2px 0">${namePart}${phonePart ? ` · ${phonePart}` : ''}</div>`;
      }).join('');

      return `<tr style="background:rgba(139,92,246,0.04)">
        <td>
          <span style="display:inline-flex;align-items:center;gap:6px">
            <svg width="13" height="13" fill="none" stroke="#8b5cf6" stroke-width="2.3" viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            ${escapeHTML(ge.title || '—')}
          </span>
        </td>
        <td>${fmtDate(ge.date)}</td>
        <td>${ge.startTime || ''}–${ge.endTime || ''}</td>
        <td>${escapeHTML(teacherName(ge.assignedPersonId))}</td>
        <td style="min-width:180px">${participantLinks || '—'}</td>
        <td>${geContracts.length > 0 ? `✓ ${geContracts.length}` : '—'}</td>
        <td class="earnings-val">₴${earn}</td>
        <td>${escapeHTML(ge.updatedBy || ge.createdBy || '—')}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<div class="table-card">
      <table class="ct">
        <thead><tr>
          <th>Назва</th><th>Дата</th><th>Час</th>
          <th>Вчитель</th><th>Телефон</th>
          <th>Договір</th><th>Заробіток</th><th>Завершив</th>
        </tr></thead>
        <tbody>${groupRows}${singleRows}</tbody>
      </table>
    </div>`;
  }

  function copyPhone(el, phone) {
    navigator.clipboard.writeText(phone).then(() => {
      const prev = el.textContent;
      el.textContent = 'Скопійовано!';
      setTimeout(() => el.textContent = prev, 1400);
    });
  }

  window.copyPhone = copyPhone;
</script>
</body>
</html>
