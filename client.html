<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Клієнт — EduCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f6ef7'/><stop offset='1' stop-color='%233b5be8'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='url(%23g)'/><rect x='7' y='9' width='11' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='8' height='2.5' rx='1.25' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .cl-topbar {
      height: 60px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 24px;
      flex-shrink: 0;
      box-shadow: var(--shadow-xs);
    }
    .cl-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none;
      font-weight: 700; font-size: 13px;
      padding: 7px 12px; border-radius: var(--radius-sm);
      transition: background 0.15s, color 0.15s; white-space: nowrap;
    }
    .cl-back:hover { background: var(--bg3); color: var(--text); }
    .cl-topbar-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .cl-topbar-name {
      font-size: 15px; font-weight: 800; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cl-topbar-phone {
      font-size: 13px; font-weight: 600; color: var(--text3);
      font-family: var(--font-mono); white-space: nowrap;
    }
    .cl-topbar-spacer { flex: 1; }
    .cl-user-chip {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--text2);
    }
    .cl-user-avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #4f6ef7, #3b5be8);
      color: #fff; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px;
    }

    /* ── THREE-COLUMN LAYOUT ── */
    .cl-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      gap: 0;
      height: calc(100dvh - 60px);
      overflow: hidden;
    }

    .cl-col {
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }
    .cl-col:last-child { border-right: none; }

    /* ── LEFT COLUMN — INFO ── */
    .cl-info { padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }

    .cl-avatar-big {
      width: 68px; height: 68px;
      border-radius: 18px;
      background: var(--accent-light);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 24px;
      flex-shrink: 0;
      margin: 0 auto;
    }

    .cl-name-edit {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cl-name-input {
      flex: 1;
      border: 1.5px solid transparent;
      border-radius: 8px;
      padding: 7px 10px;
      font-family: var(--font-main);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      background: transparent;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      min-width: 0;
    }
    .cl-name-input:focus {
      border-color: var(--accent);
      background: var(--bg2);
    }
    .cl-name-input::placeholder { color: var(--text3); font-style: italic; font-weight: 500; }
    .cl-name-save-btn {
      display: none;
      padding: 6px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .cl-name-save-btn:hover { background: var(--accent-hover); }

    .cl-info-section {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .cl-info-section-title {
      padding: 8px 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text3);
      background: var(--bg4);
      border-bottom: 1px solid var(--border);
    }
    .cl-info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .cl-info-row:last-child { border-bottom: none; }
    .cl-info-label { color: var(--text3); font-weight: 600; flex-shrink: 0; }
    .cl-info-value { color: var(--text); font-weight: 700; text-align: right; font-family: var(--font-mono); font-size: 12.5px; }
    .cl-info-value.mono-off { font-family: var(--font-main); font-size: 13px; }

    .cl-contract-yes { color: var(--green); }
    .cl-contract-no  { color: var(--text3); }

    /* ── MIDDLE COLUMN — TIMELINE ── */
    .cl-timeline { padding: 20px; display: flex; flex-direction: column; gap: 0; }
    .cl-timeline-title {
      font-size: 13px; font-weight: 800; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .tl-item {
      display: flex;
      gap: 12px;
      padding-bottom: 20px;
      position: relative;
    }
    .tl-item::before {
      content: '';
      position: absolute;
      left: 17px;
      top: 36px;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .tl-item:last-child::before { display: none; }

    .tl-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      z-index: 1;
    }
    .tl-icon-event   { background: var(--blue-bg);   color: var(--blue); }
    .tl-icon-review  { background: var(--green-bg);  color: var(--green); }
    .tl-icon-comment { background: var(--accent-light); color: var(--accent); }

    .tl-card {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      min-width: 0;
    }

    .tl-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .tl-card-type {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tl-type-event   { color: var(--blue); }
    .tl-type-review  { color: var(--green); }
    .tl-type-comment { color: var(--accent); }

    .tl-card-time {
      font-size: 11px; font-weight: 600; color: var(--text3); white-space: nowrap;
    }
    .tl-card-title {
      font-size: 13.5px; font-weight: 700; color: var(--text); margin-bottom: 4px;
    }
    .tl-card-text {
      font-size: 13px; color: var(--text2); line-height: 1.55; white-space: pre-wrap;
    }
    .tl-card-meta {
      margin-top: 8px; font-size: 11px; font-weight: 600; color: var(--text3);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .tl-status {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 5px;
      font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .tl-status-pending   { background: var(--yellow-bg); color: var(--yellow-text); }
    .tl-status-confirmed { background: var(--blue-bg);   color: var(--blue-text); }
    .tl-status-completed { background: var(--green-bg);  color: var(--green-text); }
    .tl-status-cancelled { background: var(--red-bg);    color: var(--red-text); }

    .tl-empty {
      text-align: center; padding: 48px 16px;
      color: var(--text3); font-size: 13px; font-weight: 600;
    }

    /* ── RIGHT COLUMN — ADD COMMENT ── */
    .cl-comment-col { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
    .cl-comment-title {
      font-size: 13px; font-weight: 800; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .cl-comment-author {
      display: flex; align-items: center; gap: 8px;
      font-size: 12.5px; font-weight: 600; color: var(--text2);
    }
    .cl-comment-author-avatar {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #4f6ef7, #3b5be8);
      color: #fff; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 11px; flex-shrink: 0;
    }
    textarea.cl-comment-text {
      width: 100%; min-height: 140px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: 14px; color: var(--text);
      background: var(--bg2);
      resize: vertical; outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    textarea.cl-comment-text:focus { border-color: var(--accent); }
    textarea.cl-comment-text::placeholder { color: var(--text3); }
    .cl-comment-submit {
      width: 100%; padding: 12px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-main); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
    }
    .cl-comment-submit:hover    { background: var(--accent-hover); }
    .cl-comment-submit:disabled { opacity: 0.55; cursor: not-allowed; }
    .cl-toast {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      display: none;
    }
    .cl-toast.ok  { background: var(--green-bg); color: var(--green-text); display: block; }
    .cl-toast.err { background: var(--red-bg);   color: var(--red-text);   display: block; }

    /* ── AUTH LOADER ── */
    #auth-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOADING STATE ── */
    .tl-loading {
      display: flex; align-items: center; gap: 10px;
      padding: 32px 0; color: var(--text3);
      font-size: 13px; font-weight: 600;
    }
    .tl-spinner {
      width: 22px; height: 22px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .cl-layout {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }
      .cl-col { border-right: none; border-bottom: 1px solid var(--border); overflow-y: visible; }
      .cl-col:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

<div id="auth-loader"><div class="auth-spinner"></div></div>

<!-- TOP BAR -->
<header class="cl-topbar">
  <a href="clients.html" class="cl-back">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Клієнти
  </a>
  <div class="cl-topbar-divider"></div>
  <span class="cl-topbar-name" id="topbar-name">—</span>
  <span class="cl-topbar-phone" id="topbar-phone"></span>
  <div class="cl-topbar-spacer"></div>
  <div class="cl-user-chip">
    <div class="cl-user-avatar" id="user-avatar">?</div>
    <span id="user-name-lbl"></span>
  </div>
</header>

<!-- THREE COLUMNS -->
<div class="cl-layout">

  <!-- LEFT: INFO -->
  <div class="cl-col">
    <div class="cl-info">
      <div class="cl-avatar-big" id="cl-avatar-big">?</div>

      <!-- Name editor -->
      <div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:6px">Ім'я клієнта</div>
        <div class="cl-name-edit">
          <input class="cl-name-input" id="cl-name-input" type="text" placeholder="Додати ім'я…"
            oninput="onNameInput()" onkeydown="onNameKey(event)">
          <button class="cl-name-save-btn" id="cl-name-save" onclick="saveName()">Зберегти</button>
        </div>
      </div>

      <!-- Contact info -->
      <div class="cl-info-section">
        <div class="cl-info-section-title">Контакт</div>
        <div class="cl-info-row">
          <span class="cl-info-label">Телефон</span>
          <span class="cl-info-value" id="info-phone">—</span>
        </div>
        <div class="cl-info-row">
          <span class="cl-info-label">Доданий</span>
          <span class="cl-info-value mono-off" id="info-created">—</span>
        </div>
      </div>

      <!-- Stats -->
      <div class="cl-info-section">
        <div class="cl-info-section-title">Статистика</div>
        <div class="cl-info-row">
          <span class="cl-info-label">Всього подій</span>
          <span class="cl-info-value" id="info-total">—</span>
        </div>
        <div class="cl-info-row">
          <span class="cl-info-label">Проведено</span>
          <span class="cl-info-value" id="info-completed">—</span>
        </div>
        <div class="cl-info-row">
          <span class="cl-info-label">Перша подія</span>
          <span class="cl-info-value mono-off" id="info-first">—</span>
        </div>
        <div class="cl-info-row">
          <span class="cl-info-label">Договір</span>
          <span class="cl-info-value mono-off" id="info-contract">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MIDDLE: TIMELINE -->
  <div class="cl-col">
    <div class="cl-timeline">
      <div class="cl-timeline-title">Історія</div>
      <div id="timeline-body">
        <div class="tl-loading"><div class="tl-spinner"></div>Завантаження…</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: ADD COMMENT -->
  <div class="cl-col">
    <div class="cl-comment-col">
      <div class="cl-comment-title">Новий коментар</div>
      <div class="cl-comment-author">
        <div class="cl-comment-author-avatar" id="comment-author-avatar">?</div>
        <span id="comment-author-name">—</span>
      </div>
      <textarea class="cl-comment-text" id="comment-text"
        placeholder="Введіть коментар про клієнта…"></textarea>
      <button class="cl-comment-submit" id="comment-submit" onclick="addComment()">
        Додати коментар
      </button>
      <div class="cl-toast" id="cl-toast"></div>
    </div>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const phoneKey = params.get('id');

  let currentUser = '';
  let clientData  = {};
  let clientEvents = {};

  if (!phoneKey) window.location.href = 'clients.html';

  // ── AUTH ──────────────────────────────────────────────────
  auth.onAuthStateChanged(async firebaseUser => {
    const loader = document.getElementById('auth-loader');
    if (!firebaseUser) { window.location.href = 'index.html'; return; }

    try {
      const snap = await db.ref('users').orderByChild('email')
        .equalTo(firebaseUser.email.toLowerCase()).once('value');
      if (!snap.exists()) { await auth.signOut(); window.location.href = 'index.html'; return; }
      const uid = Object.keys(snap.val())[0];
      currentUser = snap.val()[uid].name || firebaseUser.displayName || firebaseUser.email;

      const initials = currentUser.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      document.getElementById('user-avatar').textContent         = initials;
      document.getElementById('user-name-lbl').textContent       = currentUser;
      document.getElementById('comment-author-avatar').textContent = initials;
      document.getElementById('comment-author-name').textContent  = currentUser;

      loader.style.display = 'none';
      initPage();
    } catch (e) {
      window.location.href = 'index.html';
    }
  });

  // ── INIT ──────────────────────────────────────────────────
  async function initPage() {
    // Client info (real-time)
    db.ref('clients/' + phoneKey).on('value', snap => {
      if (!snap.exists()) return;
      clientData = snap.val();
      renderInfo();
    });

    // Events for this client (one-time, then re-render on comment changes)
    await loadTimeline();

    // Comments (real-time)
    db.ref('clientTimeline/' + phoneKey).on('child_added', () => loadTimeline());
    db.ref('clientTimeline/' + phoneKey).on('child_removed', () => loadTimeline());
  }

  // ── INFO (left col) ───────────────────────────────────────
  function renderInfo() {
    const name = clientData.name || '';
    document.getElementById('cl-name-input').value    = name;
    document.getElementById('topbar-name').textContent = name || 'Без імені';
    document.getElementById('topbar-phone').textContent = clientData.phone || phoneKey;
    document.getElementById('info-phone').textContent   = clientData.phone || phoneKey;
    document.getElementById('info-created').textContent = clientData.createdAt
      ? new Date(clientData.createdAt).toLocaleDateString('uk-UA', { day:'2-digit', month:'long', year:'numeric' })
      : '—';

    const initials = name
      ? name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
      : (clientData.phone || phoneKey).slice(-2);
    document.getElementById('cl-avatar-big').textContent = initials;

    // Stats rendered after events load
  }

  function renderStats(eventsArr) {
    const total     = eventsArr.length;
    const completed = eventsArr.filter(e => e.status === 'completed').length;
    const contract  = eventsArr.some(e => e.contractSigned);
    const dates     = eventsArr.map(e => e.date).filter(Boolean).sort();
    const first     = dates.length
      ? new Date(dates[0]).toLocaleDateString('uk-UA', { day:'2-digit', month:'short', year:'numeric' })
      : '—';

    document.getElementById('info-total').textContent     = total;
    document.getElementById('info-completed').textContent  = completed;
    document.getElementById('info-first').textContent      = first;
    const contractEl = document.getElementById('info-contract');
    contractEl.textContent = contract ? 'Так ✓' : 'Немає';
    contractEl.className   = 'cl-info-value mono-off ' + (contract ? 'cl-contract-yes' : 'cl-contract-no');
  }

  // ── TIMELINE (middle col) ─────────────────────────────────
  async function loadTimeline() {
    // 1. Events by phone
    const evSnap = await db.ref('events')
      .orderByChild('phone').equalTo(clientData.phone || phoneKey).once('value');
    clientEvents = evSnap.val() || {};
    const evArr  = Object.entries(clientEvents).map(([id, ev]) => ({ id, ...ev }));

    renderStats(evArr);

    // 2. Reviews for those events
    const reviewItems = [];
    await Promise.all(evArr.map(async ev => {
      const rSnap = await db.ref('reviews/' + ev.id).once('value');
      if (rSnap.exists()) {
        const r = rSnap.val();
        reviewItems.push({ type:'review', id: ev.id, text: r.comment,
          eventTitle: r.eventTitle || ev.title, createdAt: r.createdAt });
      }
    }));

    // 3. Comments
    const cSnap = await db.ref('clientTimeline/' + phoneKey).once('value');
    const commentItems = [];
    if (cSnap.exists()) {
      cSnap.forEach(c => {
        const v = c.val();
        commentItems.push({ type:'comment', id: c.key, text: v.text,
          author: v.author, createdAt: v.createdAt });
      });
    }

    // 4. Merge & sort
    const items = [
      ...evArr.map(ev => ({ type:'event', ...ev, createdAt: new Date(ev.createdAt||0).getTime() })),
      ...reviewItems,
      ...commentItems
    ].sort((a, b) => (b.createdAt||0) - (a.createdAt||0));

    renderTimeline(items);
  }

  function renderTimeline(items) {
    const body = document.getElementById('timeline-body');
    if (items.length === 0) {
      body.innerHTML = `<div class="tl-empty">Поки що немає подій або коментарів</div>`;
      return;
    }

    body.innerHTML = items.map(item => {
      const time = item.createdAt
        ? new Date(item.createdAt).toLocaleString('uk-UA', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
        : '';

      if (item.type === 'event') {
        const statusLabel = { pending:'Очікує', confirmed:'Підтверджено', completed:'Проведено', cancelled:'Скасовано' };
        const statusKey   = item.status || 'pending';
        return `
          <div class="tl-item">
            <div class="tl-icon tl-icon-event">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div class="tl-card">
              <div class="tl-card-header">
                <span class="tl-card-type tl-type-event">Подія</span>
                <span class="tl-card-time">${time}</span>
              </div>
              <div class="tl-card-title">${escH(item.title || '—')}</div>
              <div class="tl-card-meta">
                <span class="tl-status tl-status-${statusKey}">${statusLabel[statusKey]||statusKey}</span>
                ${item.date ? `<span>${item.date}${item.startTime ? ' · ' + item.startTime + '–' + (item.endTime||'') : ''}</span>` : ''}
                ${item.contractSigned ? `<span style="color:var(--green);font-weight:700">✓ Договір</span>` : ''}
              </div>
              ${item.description ? `<div class="tl-card-text" style="margin-top:8px">${escH(item.description)}</div>` : ''}
            </div>
          </div>`;
      }

      if (item.type === 'review') {
        return `
          <div class="tl-item">
            <div class="tl-icon tl-icon-review">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <div class="tl-card">
              <div class="tl-card-header">
                <span class="tl-card-type tl-type-review">Відгук</span>
                <span class="tl-card-time">${time}</span>
              </div>
              <div class="tl-card-title">${escH(item.eventTitle || 'Відгук про захід')}</div>
              <div class="tl-card-text">${escH(item.text || '')}</div>
            </div>
          </div>`;
      }

      // comment
      return `
        <div class="tl-item">
          <div class="tl-icon tl-icon-comment">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="13" y2="14"/>
            </svg>
          </div>
          <div class="tl-card">
            <div class="tl-card-header">
              <span class="tl-card-type tl-type-comment">Коментар</span>
              <span class="tl-card-time">${time}</span>
            </div>
            <div class="tl-card-text">${escH(item.text || '')}</div>
            <div class="tl-card-meta">${escH(item.author || '')}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── NAME EDIT ─────────────────────────────────────────────
  function onNameInput() {
    const val = document.getElementById('cl-name-input').value.trim();
    document.getElementById('cl-name-save').style.display = val ? 'block' : 'none';
  }
  function onNameKey(e) {
    if (e.key === 'Enter') saveName();
  }
  async function saveName() {
    const val = document.getElementById('cl-name-input').value.trim();
    await db.ref('clients/' + phoneKey).update({ name: val });
    document.getElementById('cl-name-save').style.display = 'none';
    showToast('Ім\'я збережено', true);
  }

  // ── ADD COMMENT ───────────────────────────────────────────
  async function addComment() {
    const text = document.getElementById('comment-text').value.trim();
    if (!text) {
      document.getElementById('comment-text').style.borderColor = 'var(--red)';
      setTimeout(() => document.getElementById('comment-text').style.borderColor = '', 1500);
      return;
    }
    const btn = document.getElementById('comment-submit');
    btn.disabled = true; btn.textContent = 'Зберігаємо…';
    try {
      await db.ref('clientTimeline/' + phoneKey).push({
        type: 'comment', text, author: currentUser, createdAt: Date.now()
      });
      document.getElementById('comment-text').value = '';
      showToast('Коментар додано', true);
    } catch (e) {
      showToast('Помилка збереження', false);
    }
    btn.disabled = false; btn.textContent = 'Додати коментар';
  }

  function showToast(msg, ok) {
    const el = document.getElementById('cl-toast');
    el.textContent = msg;
    el.className = 'cl-toast ' + (ok ? 'ok' : 'err');
    setTimeout(() => el.className = 'cl-toast', 3000);
  }

  function escH(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
